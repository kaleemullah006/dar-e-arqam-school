<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin — DAR E ARQAM Network</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a6b4a; --green-mid: #2d9b6f; --green-light: #e8f5ee;
    --red: #c0392b; --red-light: #fdf0ee;
    --gold: #b8860b; --gold-light: #fef9e7;
    --blue: #1a5276; --blue-light: #eaf2fb;
    --dark: #0d1f15; --text: #1a202c; --text-muted: #718096;
    --border: #e0e6ed; --bg: #f0f4f8; --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px; --radius-sm: 8px;
  }

  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN SCREEN */
  .login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0d1f15 0%, #1a6b4a 60%, #2d9b6f 100%);
    padding: 20px;
  }
  .login-card {
    background: white; border-radius: 20px; padding: 40px;
    width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-logo { text-align: center; margin-bottom: 24px; }
  .login-logo-icon { width: 64px; height: 64px; background: var(--green); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 12px; }
  .login-title { font-size: 20px; font-weight: 700; color: var(--text); }
  .login-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; transition: border-color 0.2s; }
  .form-group input:focus { outline: none; border-color: var(--green); }
  .login-btn { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .login-btn:hover { background: var(--green-mid); }
  .login-error { background: var(--red-light); color: var(--red); padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; display: none; }

  /* MAIN APP */
  .app { display: none; min-height: 100vh; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d1f15 0%, #1a6b4a 100%);
    color: white; padding: 14px 24px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    position: sticky; top: 0; z-index: 100;
  }
  .header-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 11px; opacity: 0.65; margin-top: 2px; }
  .header-badge { background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 600; border: 1px solid rgba(255,255,255,0.2); }
  .logout-btn { margin-left: auto; padding: 7px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; }
  .logout-btn:hover { background: rgba(255,255,255,0.2); }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: white; border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .stat-card.green::before { background: var(--green-mid); }
  .stat-card.red::before { background: var(--red); }
  .stat-card.gold::before { background: var(--gold); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-emoji { font-size: 24px; margin-bottom: 8px; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.red .stat-value { color: var(--red); }
  .stat-card.gold .stat-value { color: var(--gold); }
  .stat-card.blue .stat-value { color: var(--blue); }

  /* CARDS */
  .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 20px 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .card-title { font-size: 15px; font-weight: 700; }

  /* BUTTONS */
  .btn { padding: 9px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 13px; font-weight: 500; cursor: pointer; background: white; color: var(--text); transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
  .btn:hover { background: var(--bg); }
  .btn-green { background: var(--green); color: white; border-color: var(--green); }
  .btn-green:hover { background: var(--green-mid); }
  .btn-red { background: var(--red-light); color: var(--red); border-color: var(--red); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* TOGGLE SWITCH */
  .toggle-wrap { display: flex; align-items: center; gap: 10px; }
  .toggle { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 99px; cursor: pointer; transition: 0.3s; }
  .toggle-slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.3s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  input:checked + .toggle-slider { background: var(--green); }
  input:checked + .toggle-slider::before { transform: translateX(22px); }
  .toggle-label { font-size: 13px; font-weight: 500; }

  /* SCHOOL CARDS */
  .school-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .school-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; background: white; transition: all 0.2s; position: relative; }
  .school-card.active { border-color: var(--green); }
  .school-card.inactive { opacity: 0.65; border-color: #ddd; }
  .school-card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .school-avatar { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .school-name { font-size: 14px; font-weight: 700; }
  .school-location { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .school-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .school-stat { background: var(--bg); border-radius: var(--radius-sm); padding: 8px; text-align: center; }
  .school-stat-val { font-size: 16px; font-weight: 700; color: var(--text); }
  .school-stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .school-actions { display: flex; gap: 8px; align-items: center; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.on { background: var(--green); }
  .status-dot.off { background: var(--red); }

  /* BADGES */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-red { background: var(--red-light); color: var(--red); }
  .badge-gold { background: var(--gold-light); color: var(--gold); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: var(--radius); padding: 28px; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 14px; text-align: left; background: var(--bg); color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: white; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 9999; max-width: 300px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--red); }

  /* ACCESS LOG */
  .log-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .log-item:last-child { border-bottom: none; }
  .log-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .log-text { font-size: 13px; color: var(--text); flex: 1; }
  .log-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  @media (max-width: 600px) {
    .main { padding: 16px; }
    .header { padding: 12px 16px; }
    .form-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .school-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">👑</div>
      <div class="login-title">Super Admin Panel</div>
      <div class="login-sub">DAR E ARQAM School Network</div>
    </div>
    <div class="login-error" id="login-error"></div>
    <div class="form-group">
      <label>Admin Email</label>
      <input type="email" id="login-email" placeholder="admin@darearqam.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="login-btn" onclick="doLogin()">🔐 Login</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="main-app">
  <div class="header">
    <div class="header-icon">👑</div>
    <div>
      <div class="header-title">Super Admin Panel</div>
      <div class="header-sub">DAR E ARQAM School Network</div>
    </div>
    <div class="header-badge" id="admin-email-badge">—</div>
    <button class="logout-btn" onclick="doLogout()">🚪 Logout</button>
  </div>

  <div class="main">

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card blue"><div class="stat-emoji">🏫</div><div class="stat-label">Total Schools</div><div class="stat-value" id="st-total">0</div></div>
      <div class="stat-card green"><div class="stat-emoji">✅</div><div class="stat-label">Active Schools</div><div class="stat-value" id="st-active">0</div></div>
      <div class="stat-card red"><div class="stat-emoji">🔴</div><div class="stat-label">Inactive</div><div class="stat-value" id="st-inactive">0</div></div>
      <div class="stat-card gold"><div class="stat-emoji">👨‍🎓</div><div class="stat-label">Total Students</div><div class="stat-value" id="st-students">0</div></div>
    </div>

    <!-- SCHOOLS -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">🏫 Schools Management</div>
        <button class="btn btn-green" onclick="openAddSchool()">+ School Add Karein</button>
      </div>
      <div class="school-grid" id="school-grid">
        <div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;grid-column:1/-1">Loading...</div>
      </div>
    </div>

    <!-- ACCESS LOG -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">📋 Activity Log</div>
        <button class="btn btn-sm" onclick="clearLog()">Clear</button>
      </div>
      <div id="activity-log">
        <div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">Koi activity nahi abhi...</div>
      </div>
    </div>

  </div>
</div>

<!-- ADD SCHOOL MODAL -->
<div class="modal-overlay" id="modal-school">
  <div class="modal">
    <div class="modal-title">🏫 Naya School Add Karein</div>
    <div class="form-group"><label>School Ka Naam *</label><input type="text" id="ns-name" placeholder="DAR E ARQAM SCHOOL - Branch 2" /></div>
    <div class="form-row">
      <div class="form-group"><label>Shehar *</label><input type="text" id="ns-city" placeholder="Karachi" /></div>
      <div class="form-group"><label>Branch Code *</label><input type="text" id="ns-code" placeholder="KHI-002" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Principal</label><input type="text" id="ns-principal" placeholder="Muhammad Ali" /></div>
      <div class="form-group"><label>Phone</label><input type="text" id="ns-phone" placeholder="03xx-xxxxxxx" /></div>
    </div>
    <div class="form-group"><label>Login Email *</label><input type="email" id="ns-email" placeholder="branch2@darearqam.com" /></div>
    <div class="form-group"><label>Login Password *</label><input type="password" id="ns-pass" placeholder="Min 6 characters" /></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green" onclick="addSchool()">✅ Add & Activate</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyB8ZCgfSsXT9kU3cEqKB0Fmfn74Be7WbE8",
  authDomain: "dar-e-arqam-system.firebaseapp.com",
  databaseURL: "https://dar-e-arqam-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dar-e-arqam-system",
  storageBucket: "dar-e-arqam-system.firebasestorage.app",
  messagingSenderId: "986062924369",
  appId: "1:986062924369:web:639a39209b558310f8a670"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// ===== SUPER ADMIN EMAIL =====
const SUPER_ADMIN_EMAIL = "kohatiii006@gmail.com";

let schools = {};
let activityLog = [];

// ===== AUTH =====
auth.onAuthStateChanged(user => {
  if(user && user.email === SUPER_ADMIN_EMAIL) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('admin-email-badge').textContent = '👑 ' + user.email;
    loadSchools();
  } else if(user) {
    auth.signOut();
    showLoginError('Aapke paas Super Admin access nahi hai!');
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
  }
});

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if(!email || !pass) { showLoginError('Email aur password bharein!'); return; }
  auth.signInWithEmailAndPassword(email, pass)
    .catch(err => showLoginError('Login fail! Email ya password galat hai.'));
}

function doLogout() {
  auth.signOut();
  toast('Logout ho gaye! 👋');
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// ===== SCHOOLS =====
function loadSchools() {
  db.ref('schools').on('value', snap => {
    schools = snap.val() || {};
    renderSchools();
    updateStats();
  });
}

function renderSchools() {
  const grid = document.getElementById('school-grid');
  const list = Object.entries(schools);

  if(!list.length) {
    grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;grid-column:1/-1">Koi school nahi. + Add karein.</div>';
    return;
  }

  const emojis = ['🏫','📚','🎓','✏️','📖','🏛️'];
  grid.innerHTML = list.map(([id, s], i) => `
    <div class="school-card ${s.active ? 'active' : 'inactive'}">
      <div class="school-card-header">
        <div class="school-avatar" style="background:${s.active?'#e8f5ee':'#f4f6f7'}">${emojis[i%emojis.length]}</div>
        <div style="flex:1">
          <div class="school-name">${s.name}</div>
          <div class="school-location">📍 ${s.city || '—'} · ${s.code || '—'}</div>
          <div style="margin-top:6px">
            <span class="badge ${s.active?'badge-green':'badge-red'}">${s.active?'🟢 Active':'🔴 Inactive'}</span>
          </div>
        </div>
      </div>
      <div class="school-stats">
        <div class="school-stat"><div class="school-stat-val">${s.studentCount||0}</div><div class="school-stat-lbl">Students</div></div>
        <div class="school-stat"><div class="school-stat-val">${s.teacherCount||0}</div><div class="school-stat-lbl">Teachers</div></div>
        <div class="school-stat"><div class="school-stat-val">${s.todayAttendance||0}%</div><div class="school-stat-lbl">Attendance</div></div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">
        👤 ${s.principal||'—'} · 📞 ${s.phone||'—'}<br>
        📧 ${s.email||'—'}
      </div>
      <div class="school-actions">
        <label class="toggle">
          <input type="checkbox" ${s.active?'checked':''} onchange="toggleSchool('${id}', this.checked)">
          <div class="toggle-slider"></div>
        </label>
        <span class="toggle-label" style="color:${s.active?'var(--green)':'var(--red)'}">
          ${s.active?'School ON':'School OFF'}
        </span>
        <button class="btn btn-sm btn-red" style="margin-left:auto" onclick="deleteSchool('${id}','${s.name}')">🗑️ Delete</button>
      </div>
    </div>
  `).join('');
}

function toggleSchool(id, active) {
  const school = schools[id];
  db.ref(`schools/${id}/active`).set(active).then(() => {
    const action = active ? 'ON' : 'OFF';
    const msg = `${school.name} ko ${action} kiya gaya`;
    toast(msg + (active ? ' ✅' : ' 🔴'));
    addLog(active ? '✅' : '🔴', msg);
  }).catch(e => toast('Error: ' + e.message, true));
}

function deleteSchool(id, name) {
  if(!confirm(`"${name}" ko delete karna chahte hain? Ye permanently hata dega!`)) return;
  db.ref(`schools/${id}`).remove().then(() => {
    toast(`${name} delete ho gaya`);
    addLog('🗑️', `${name} delete kiya gaya`);
  });
}

function updateStats() {
  const list = Object.values(schools);
  const active = list.filter(s => s.active).length;
  const totalStudents = list.reduce((a, s) => a + (s.studentCount||0), 0);
  document.getElementById('st-total').textContent = list.length;
  document.getElementById('st-active').textContent = active;
  document.getElementById('st-inactive').textContent = list.length - active;
  document.getElementById('st-students').textContent = totalStudents;
}

// ===== ADD SCHOOL =====
function openAddSchool() { document.getElementById('modal-school').classList.add('open'); }
function closeModal() { document.getElementById('modal-school').classList.remove('open'); }

async function addSchool() {
  const name = document.getElementById('ns-name').value.trim();
  const city = document.getElementById('ns-city').value.trim();
  const code = document.getElementById('ns-code').value.trim();
  const principal = document.getElementById('ns-principal').value.trim();
  const phone = document.getElementById('ns-phone').value.trim();
  const email = document.getElementById('ns-email').value.trim();
  const pass = document.getElementById('ns-pass').value;

  if(!name || !city || !code || !email || !pass) {
    toast('Sab zaruri fields bharein!', true); return;
  }
  if(pass.length < 6) { toast('Password kam az kam 6 characters ka ho!', true); return; }

  try {
    // Create school record in DB
    const schoolRef = db.ref('schools').push();
    await schoolRef.set({
      name, city, code, principal, phone, email,
      active: true, studentCount: 0, teacherCount: 0,
      todayAttendance: 0, createdAt: Date.now()
    });

    toast(`${name} add ho gaya! ✅`);
    addLog('🏫', `Naya school add kiya: ${name} (${city})`);
    closeModal();
    ['ns-name','ns-city','ns-code','ns-principal','ns-phone','ns-email','ns-pass'].forEach(id => document.getElementById(id).value = '');
  } catch(e) {
    toast('Error: ' + e.message, true);
  }
}

// ===== ACTIVITY LOG =====
function addLog(icon, text) {
  const now = new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});
  activityLog.unshift({ icon, text, time: now });
  activityLog = activityLog.slice(0, 20);
  renderLog();
  db.ref('superadmin/logs').push({ icon, text, time: Date.now() });
}

function renderLog() {
  const d = document.getElementById('activity-log');
  if(!activityLog.length) {
    d.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">Koi activity nahi abhi...</div>';
    return;
  }
  d.innerHTML = activityLog.map(l => `
    <div class="log-item">
      <div class="log-icon">${l.icon}</div>
      <div class="log-text">${l.text}</div>
      <div class="log-time">${l.time}</div>
    </div>`).join('');
}

function clearLog() { activityLog = []; renderLog(); }

// ===== TOAST =====
function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Load logs from firebase
db.ref('superadmin/logs').limitToLast(10).once('value', snap => {
  const data = snap.val();
  if(data) {
    activityLog = Object.values(data).reverse().map(l => ({
      ...l, time: new Date(l.time).toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'})
    }));
    renderLog();
  }
});
</script>
</body>
</html>
