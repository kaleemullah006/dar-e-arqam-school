  .btn-blue { background: #1a5276; color: white; border-color: #1a5276; }
  .select-class {
    padding: 9px 12px; border-radius: 8px; border: 1px solid #e0e6ed;
    font-size: 13px; font-family: inherit; background: white;
  }
  .count-badge {
    background: #e8f5ee; color: #1a6b4a; padding: 4px 12px;
    border-radius: 99px; font-size: 12px; font-weight: 600;
  }

  .cards-grid {
    padding: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1200px; margin: 0 auto;
  }

  /* ID CARD */
  .id-card {
    width: 320px; height: 200px;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    position: relative; background: white;
    page-break-inside: avoid;
    cursor: pointer; transition: transform 0.2s;
  }
  .id-card:hover { transform: translateY(-3px); }

  .card-bg {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0f2419 0%, #1a6b4a 50%, #2d9b6f 100%);
  }
  .card-pattern {
    position: absolute; inset: 0; opacity: 0.06;
    background-image: repeating-linear-gradient(45deg, white 0, white 1px, transparent 0, transparent 50%);
    background-size: 10px 10px;
  }

  .card-header {
    position: relative; z-index: 1;
    padding: 8px 12px 6px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .school-badge {
    width: 26px; height: 26px; background: rgba(255,255,255,0.15);
    border-radius: 6px; display: flex; align-items: center;
    justify-content: center; font-size: 13px; flex-shrink: 0;
  }
  .school-name-card { color: white; }
  .school-title { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; line-height: 1.2; }
  .school-sub-title { font-size: 8px; opacity: 0.7; }
  .card-type { margin-left: auto; background: rgba(255,255,255,0.15); color: white; padding: 2px 8px; border-radius: 99px; font-size: 8px; font-weight: 700; letter-spacing: 1px; }

  .card-body {
    position: relative; z-index: 1;
    padding: 8px 12px;
    display: flex; gap: 10px; align-items: flex-start;
  }

  .student-avatar-card {
    width: 52px; height: 52px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: white;
    border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0;
  }

  .student-info-card { flex: 1; color: white; }
  .student-name-card { font-size: 14px; font-weight: 700; line-height: 1.2; }
  .student-class-card { font-size: 10px; opacity: 0.8; margin-top: 3px; }
  .student-id-num { font-size: 9px; opacity: 0.6; margin-top: 2px; font-family: monospace; }

  .info-row { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
  .info-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; opacity: 0.75;
  }
  .info-label { opacity: 0.6; min-width: 32px; }
  .info-value { font-weight: 600; opacity: 0.95; }

  .qr-section {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    flex-shrink: 0;
  }
  .qr-wrap {
    background: white; padding: 5px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    width: 82px; height: 82px;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .qr-wrap canvas { display: block !important; width: 72px !important; height: 72px !important; }
  .qr-label { font-size: 7px; color: rgba(255,255,255,0.7); text-align: center; letter-spacing: 0.5px; font-weight: 600; }

  .card-footer {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.25);
    padding: 4px 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-text { font-size: 8px; color: rgba(255,255,255,0.6); }
  .valid-badge { font-size: 8px; color: rgba(255,255,255,0.8); font-weight: 600; }

  .empty-msg {
    grid-column: 1/-1; text-align: center;
    padding: 60px; color: #718096; font-size: 14px;
  }

  /* PRINT */
  @media print {
    .controls { display: none !important; }
    body { background: white; }
    .cards-grid { padding: 10px; gap: 10px; }
    .id-card { box-shadow: none; border: 1px solid #ccc; }
    .id-card:hover { transform: none; }
  }
</style>
</head>
<body>

<div class="controls">
  <h2>🪪 Student ID Cards</h2>
  <select class="select-class" id="filter-class" onchange="renderCards()">
    <option value="all">Sab Classes</option>
    <option>Nursery</option><option>KG</option>
    <option>Class 1</option><option>Class 2</option><option>Class 3</option>
    <option>Class 4</option><option>Class 5</option><option>Class 6</option>
    <option>Class 7</option><option>Class 8</option>
  </select>
  <span class="count-badge" id="card-count">0 cards</span>
  <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn btn-blue" onclick="window.print()">🖨️ Print All</button>
    <button class="btn btn-green" onclick="window.location.href='dar-e-arqam-school.html'">← Dashboard</button>
  </div>
</div>

<div class="cards-grid" id="cards-grid"></div>

<script>
const COLORS = ['#1a6b4a','#1a5276','#7d3c98','#b7950b','#c0392b','#16a085','#2471a3','#884ea0'];
function getInitials(n) { return (n||'').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(); }
function getColor(i) { return COLORS[i % COLORS.length]; }

function getData() {
  try { return JSON.parse(localStorage.getItem('darearqam_data') || '{}'); } catch(e) { return {}; }
}

async function generateQR(container, studentId) {
  return new Promise(resolve => {
    try {
      const canvas = QRCode.generate(String(studentId), 72);
      if(canvas) {
        canvas.style.display = 'block';
        canvas.style.width = '72px';
        canvas.style.height = '72px';
        container.innerHTML = '';
        container.appendChild(canvas);
      } else {
        container.innerHTML = '<div style="width:72px;height:72px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:8px;color:#666;text-align:center;border-radius:4px">QR<br>Error</div>';
      }
    } catch(e) {
      container.innerHTML = '<div style="width:72px;height:72px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:8px;color:#666;text-align:center;border-radius:4px">QR<br>Error</div>';
      console.error('QR Error:', e);
    }
    resolve();
  });
}

async function renderCards() {
  const d = getData();
  const students = d.students || [];
  const filterClass = document.getElementById('filter-class').value;
  const filtered = filterClass === 'all' ? students : students.filter(s => s.class === filterClass);

  document.getElementById('card-count').textContent = filtered.length + ' cards';
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';

  if(!filtered.length) {
    grid.innerHTML = '<div class="empty-msg">Koi student nahi mila. Pehle Dashboard mein students add karein.</div>';
    return;
  }

  for(let i = 0; i < filtered.length; i++) {
    const s = filtered[i];
    const globalIdx = students.findIndex(x => x.id === s.id);
    const color = getColor(globalIdx);
    const year = new Date().getFullYear();

    const card = document.createElement('div');
    card.className = 'id-card';
    card.innerHTML = `
      <div class="card-bg"></div>
      <div class="card-pattern"></div>
      <div class="card-header">
        <div class="school-badge">🏫</div>
        <div class="school-name-card">
          <div class="school-title">DAR E ARQAM SCHOOL SFHC</div>
          <div class="school-sub-title">Student Identity Card</div>
        </div>
        <div class="card-type">STUDENT</div>
      </div>
      <div class="card-body">
        <div>
          <div class="student-avatar-card" style="background:${color}88">${getInitials(s.name)}</div>
        </div>
        <div class="student-info-card">
          <div class="student-name-card">${s.name}</div>
          <div class="student-class-card">${s.class}</div>
          <div class="student-id-num">ID: ${String(s.id).slice(-6)}</div>
          <div class="info-row">
            <div class="info-item">
              <span class="info-label">Parent:</span>
              <span class="info-value">${s.parent||'—'}</span>
            </div>
            <div class="info-item">
              <span class="info-label">Phone:</span>
              <span class="info-value">${s.phone||'—'}</span>
            </div>
          </div>
        </div>
        <div class="qr-section">
          <div class="qr-wrap" id="qr-${s.id}"></div>
          <div class="qr-label">SCAN FOR<br>ATTENDANCE</div>
        </div>
      </div>
      <div class="card-footer">
        <span class="footer-text">Session ${year}-${year+1}</span>
        <span class="valid-badge">✓ Valid Card</span>
      </div>
    `;
    grid.appendChild(card);

    // Generate QR
    await generateQR(document.getElementById('qr-'+s.id), s.id);
  }
}

renderCards();
</script>
</body>
</html>
