<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher ID Cards — DAR E ARQAM</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; }

  .controls {
    background: white; padding: 16px 24px;
    border-bottom: 1px solid #e0e6ed;
    display: flex; gap: 12px; align-items: center;
    flex-wrap: wrap; position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .controls h2 { font-size: 16px; font-weight: 600; }
  .btn { padding: 9px 18px; border-radius: 8px; border: 1px solid #e0e6ed; font-size: 13px; cursor: pointer; background: white; font-family: inherit; transition: all 0.15s; }
  .btn:hover { background: #f4f6f7; }
  .btn-blue { background: #1a5276; color: white; border-color: #1a5276; }
  .btn-green { background: #1a6b4a; color: white; border-color: #1a6b4a; }
  .count-badge { background: #eaf2fb; color: #1a5276; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }

  .cards-grid { padding: 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }

  /* TEACHER ID CARD — Navy/Gold Professional Theme */
  .id-card {
    width: 300px; height: 188px;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    position: relative; background: white;
    page-break-inside: avoid; cursor: pointer;
    transition: transform 0.2s;
  }
  .id-card:hover { transform: translateY(-3px); }

  .card-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0a1628 0%, #1a3a6b 50%, #2a5298 100%); }
  .card-accent { position: absolute; top: 0; right: 0; width: 120px; height: 120px; background: rgba(184,134,11,0.15); border-radius: 0 0 0 120px; }
  .card-pattern {
    position: absolute; inset: 0; opacity: 0.04;
    background-image: repeating-linear-gradient(0deg, white 0, white 1px, transparent 0, transparent 8px),
                      repeating-linear-gradient(90deg, white 0, white 1px, transparent 0, transparent 8px);
  }

  .card-header {
    position: relative; z-index: 1;
    padding: 8px 12px 6px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid rgba(184,134,11,0.3);
  }
  .school-badge-t { width: 26px; height: 26px; background: rgba(184,134,11,0.25); border: 1px solid rgba(184,134,11,0.4); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .school-title-t { color: white; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
  .school-sub-t { color: rgba(184,134,11,0.9); font-size: 8px; margin-top: 1px; }
  .card-type-t { margin-left: auto; background: rgba(184,134,11,0.25); color: rgba(184,134,11,1); padding: 2px 8px; border-radius: 99px; font-size: 8px; font-weight: 700; letter-spacing: 1px; border: 1px solid rgba(184,134,11,0.4); }

  .card-body-t { position: relative; z-index: 1; padding: 8px 12px; display: flex; gap: 10px; }

  .teacher-avatar-t {
    width: 54px; height: 54px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: white;
    border: 2px solid rgba(184,134,11,0.5); flex-shrink: 0;
  }

  .teacher-info-t { flex: 1; color: white; }
  .teacher-name-t { font-size: 14px; font-weight: 700; line-height: 1.2; }
  .teacher-subject-t { font-size: 10px; color: rgba(184,134,11,0.9); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .teacher-id-t { font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 2px; font-family: monospace; }

  .info-rows-t { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
  .info-row-t { font-size: 9px; color: rgba(255,255,255,0.7); display: flex; gap: 4px; }
  .info-label-t { color: rgba(184,134,11,0.8); min-width: 28px; }

  .qr-section-t { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .qr-wrap-t { background: white; padding: 4px; border-radius: 6px; border: 1px solid rgba(184,134,11,0.3); }
  .qr-label-t { font-size: 7px; color: rgba(255,255,255,0.5); text-align: center; }

  .card-footer-t {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(184,134,11,0.15); border-top: 1px solid rgba(184,134,11,0.3);
    padding: 4px 12px; display: flex; justify-content: space-between; align-items: center;
  }
  .footer-text-t { font-size: 8px; color: rgba(255,255,255,0.5); }
  .valid-badge-t { font-size: 8px; color: rgba(184,134,11,0.9); font-weight: 600; }

  .empty-msg { grid-column: 1/-1; text-align: center; padding: 60px; color: #718096; font-size: 14px; }
  .loading { grid-column: 1/-1; text-align: center; padding: 40px; color: #718096; }

  @media print {
    .controls { display: none !important; }
    body { background: white; }
    .cards-grid { padding: 10px; gap: 10px; }
    .id-card { box-shadow: none; border: 1px solid #ccc; }
    .id-card:hover { transform: none; }
  }
</style>
</head>
<body>

<div class="controls">
  <h2>👩‍🏫 Teacher ID Cards</h2>
  <span class="count-badge" id="card-count">Loading...</span>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-blue" onclick="window.print()">🖨️ Print All</button>
    <button class="btn btn-green" onclick="window.location.href='dar-e-arqam-school.html'">← Dashboard</button>
  </div>
</div>

<div class="cards-grid" id="cards-grid">
  <div class="loading">🔄 Firebase se data load ho raha hai...</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB8ZCgfSsXT9kU3cEqKB0Fmfn74Be7WbE8",
  authDomain: "dar-e-arqam-system.firebaseapp.com",
  databaseURL: "https://dar-e-arqam-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dar-e-arqam-system",
  storageBucket: "dar-e-arqam-system.firebasestorage.app",
  messagingSenderId: "986062924369",
  appId: "1:986062924369:web:639a39209b558310f8a670"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const COLORS = ['#1a3a6b','#2a5298','#1a6b4a','#7d3c98','#c0392b','#16a085','#b7950b'];
const getInitials = n => (n||'').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
const getColor = i => COLORS[i % COLORS.length];

async function generateQR(container, teacherId) {
  return new Promise(resolve => {
    const canvas = document.createElement('canvas');
    canvas.width = 56; canvas.height = 56;
    QRCode.toCanvas(canvas, 'TEACHER:' + String(teacherId), {
      width: 56, margin: 0,
      color: { dark: '#000000', light: '#ffffff' }
    }, err => { if(!err) container.appendChild(canvas); resolve(); });
  });
}

async function renderCards(teachers) {
  const grid = document.getElementById('cards-grid');
  const list = Object.entries(teachers || {});

  document.getElementById('card-count').textContent = list.length + ' cards';

  if(!list.length) {
    grid.innerHTML = '<div class="empty-msg">👩‍🏫 Koi teacher nahi. Pehle Dashboard mein teachers add karein.</div>';
    return;
  }

  grid.innerHTML = '';
  const year = new Date().getFullYear();

  for(let i = 0; i < list.length; i++) {
    const [id, t] = list[i];
    const color = getColor(i);

    const card = document.createElement('div');
    card.className = 'id-card';
    card.innerHTML = `
      <div class="card-bg"></div>
      <div class="card-accent"></div>
      <div class="card-pattern"></div>
      <div class="card-header">
        <div class="school-badge-t">🏫</div>
        <div>
          <div class="school-title-t">DAR E ARQAM SCHOOL SFHC</div>
          <div class="school-sub-t">Staff Identity Card</div>
        </div>
        <div class="card-type-t">TEACHER</div>
      </div>
      <div class="card-body-t">
        <div>
          <div class="teacher-avatar-t" style="background:${color}88">${getInitials(t.name)}</div>
        </div>
        <div class="teacher-info-t">
          <div class="teacher-name-t">${t.name}</div>
          <div class="teacher-subject-t">${t.subject||'Teacher'}</div>
          <div class="teacher-id-t">ID: TCH-${String(id).slice(-4).toUpperCase()}</div>
          <div class="info-rows-t">
            <div class="info-row-t"><span class="info-label-t">Phone:</span>${t.phone||'—'}</div>
            <div class="info-row-t"><span class="info-label-t">Join:</span>${t.joinDate||year}</div>
          </div>
        </div>
        <div class="qr-section-t">
          <div class="qr-wrap-t" id="qr-t-${id}"></div>
          <div class="qr-label-t">SCAN FOR<br>ATTENDANCE</div>
        </div>
      </div>
      <div class="card-footer-t">
        <span class="footer-text-t">Session ${year}-${year+1}</span>
        <span class="valid-badge-t">✓ Authorized Staff</span>
      </div>
    `;
    grid.appendChild(card);
    await generateQR(document.getElementById('qr-t-'+id), id);
  }
}

// Load teachers from Firebase
db.ref('school-management/teachers').once('value', snap => {
  const data = snap.val();
  if(data) {
    renderCards(data);
  } else {
    // Fallback to localStorage
    try {
      const local = JSON.parse(localStorage.getItem('darearqam_data') || '{}');
      const teachers = local.teachers || [];
      const obj = {};
      teachers.forEach(t => { obj[t.id] = t; });
      renderCards(obj);
    } catch(e) {
      document.getElementById('cards-grid').innerHTML = '<div class="empty-msg">Dashboard mein pehle teachers add karein.</div>';
    }
  }
});
</script>
</body>
</html>
