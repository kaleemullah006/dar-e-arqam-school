<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gate Scanner — DAR E ARQAM</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a6b4a; --green-light: #e8f5ee; --green-mid: #2d9b6f;
    --red: #c0392b; --gold: #b8860b; --dark: #0f2419;
  }
  body { font-family: 'Segoe UI', sans-serif; background: var(--dark); min-height: 100vh; color: white; display: flex; flex-direction: column; }

  .header { background: rgba(255,255,255,0.05); padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .header-logo { width: 36px; height: 36px; background: var(--green); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .header-title { font-size: 13px; font-weight: 600; }
  .header-sub { font-size: 10px; opacity: 0.55; margin-top: 1px; }
  .header-clock { margin-left: auto; text-align: right; }
  .clock-time { font-size: 17px; font-weight: 300; letter-spacing: 1px; }
  .clock-date { font-size: 10px; opacity: 0.55; }

  .mode-tabs { display: flex; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.08); }
  .mode-tab { flex: 1; padding: 11px 6px; text-align: center; font-size: 12px; font-weight: 600; cursor: pointer; opacity: 0.45; transition: all 0.2s; border-bottom: 3px solid transparent; }
  .mode-tab.active { opacity: 1; border-bottom-color: var(--green-mid); color: #2d9b6f; }

  .panel { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
  .panel.active { display: flex; }

  /* QR */
  .scanner-wrap { padding: 16px; display: flex; flex-direction: column; align-items: center; }
  .scanner-box { width: 100%; max-width: 320px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; margin-bottom: 12px; }
  #qr-reader { width: 100% !important; }
  #qr-reader video { width: 100% !important; border-radius: 0 !important; }
  #qr-reader img { display: none !important; }
  .scan-hint { font-size: 12px; opacity: 0.4; text-align: center; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; justify-content: center; }
  .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-mid); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.4)} }

  /* MANUAL */
  .manual-wrap { padding: 16px; flex: 1; }
  .manual-tip { font-size: 12px; opacity: 0.5; margin-bottom: 12px; padding: 10px 14px; background: rgba(255,255,255,0.04); border-radius: 8px; border-left: 3px solid var(--green-mid); }
  .search-box { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); color: white; font-size: 14px; font-family: inherit; margin-bottom: 12px; }
  .search-box::placeholder { color: rgba(255,255,255,0.3); }
  .search-box:focus { outline: none; border-color: var(--green-mid); }
  .student-select-list { display: flex; flex-direction: column; gap: 8px; }
  .student-select-item { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; cursor: pointer; transition: all 0.15s; }
  .student-select-item:hover { background: rgba(255,255,255,0.1); border-color: var(--green-mid); }
  .student-select-item.marked { background: rgba(45,155,111,0.12); border-color: rgba(45,155,111,0.4); }
  .sel-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .sel-name { font-size: 13px; font-weight: 500; }
  .sel-class { font-size: 11px; opacity: 0.45; margin-top: 1px; }
  .sel-status { font-size: 11px; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
  .sel-status.present { background: rgba(45,155,111,0.2); color: #2d9b6f; }
  .sel-status.absent { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); }

  /* TODAY */
  .today-wrap { width: 100%; max-width: 320px; }
  .today-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .today-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.4; }
  .today-badge { background: var(--green); color: white; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .today-scroll { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .today-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 9px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
  .t-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .t-name { font-size: 12px; font-weight: 500; flex: 1; }
  .t-class { font-size: 10px; opacity: 0.4; }
  .t-time { font-size: 11px; opacity: 0.45; }
  .empty-state { text-align: center; opacity: 0.35; font-size: 12px; padding: 20px; }

  /* RESULT */
  .result-card { width: 100%; max-width: 320px; border-radius: 14px; padding: 16px; display: none; margin-bottom: 14px; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .result-card.show { display: block; }
  .result-card.success { background: linear-gradient(135deg,#1a6b4a,#2d9b6f); }
  .result-card.already { background: linear-gradient(135deg,#7d6608,#b8860b); }
  .result-card.error { background: linear-gradient(135deg,#922b21,#c0392b); }
  .res-icon { font-size: 30px; text-align: center; margin-bottom: 6px; }
  .res-name { font-size: 18px; font-weight: 700; text-align: center; }
  .res-class { font-size: 12px; opacity: 0.8; text-align: center; margin-top: 2px; }
  .res-msg { font-size: 12px; text-align: center; margin-top: 8px; background: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 99px; }

  /* FULL TODAY */
  .full-today-wrap { padding: 16px; flex: 1; }
  .full-today-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; margin-bottom: 7px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); }
  .full-today-item.present { background: rgba(45,155,111,0.08); border-color: rgba(45,155,111,0.3); }

  /* STATS */
  .stats-bar { display: flex; background: rgba(255,255,255,0.04); border-top: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }
  .stat-item { flex: 1; padding: 10px 8px; text-align: center; border-right: 1px solid rgba(255,255,255,0.07); }
  .stat-item:last-child { border-right: none; }
  .stat-num { font-size: 20px; font-weight: 600; }
  .stat-lbl { font-size: 9px; opacity: 0.4; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }
  .g { color: #2d9b6f; } .r { color: #e74c3c; } .b { color: #5dade2; }

  .no-data { text-align: center; padding: 40px 20px; opacity: 0.4; font-size: 13px; }

  /* BANNER */
  .banner { position: fixed; top: 110px; left: 50%; transform: translateX(-50%); padding: 10px 22px; border-radius: 99px; font-size: 13px; font-weight: 600; z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.3); animation: slideUp 0.3s ease; white-space: nowrap; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏫</div>
  <div>
    <div class="header-title">DAR E ARQAM SCHOOL SFHC</div>
    <div class="header-sub">Gate Attendance Scanner</div>
  </div>
  <div class="header-clock">
    <div class="clock-time" id="clock">--:--</div>
    <div class="clock-date" id="hdate">—</div>
  </div>
</div>

<div class="mode-tabs">
  <div class="mode-tab active" id="tab-qr" onclick="switchMode('qr')">📷 QR Scan</div>
  <div class="mode-tab" id="tab-manual" onclick="switchMode('manual')">👆 Manual</div>
  <div class="mode-tab" id="tab-today" onclick="switchMode('today')">📋 Aaj Ki List</div>
</div>

<!-- QR PANEL -->
<div class="panel active" id="panel-qr">
  <div class="scanner-wrap">
    <div class="scanner-box"><div id="qr-reader"></div></div>
    <div class="scan-hint"><div class="pulse-dot"></div> Student ka QR card camera ke saamne rakhein</div>
    <div class="result-card" id="qr-result"></div>
    <div class="today-wrap">
      <div class="today-header">
        <span class="today-label">Aaj Hazir Hue</span>
        <span class="today-badge" id="qr-count">0</span>
      </div>
      <div class="today-scroll" id="qr-today"></div>
    </div>
  </div>
</div>

<!-- MANUAL PANEL -->
<div class="panel" id="panel-manual">
  <div class="manual-wrap">
    <div class="manual-tip">💡 Demo ke liye: Student ka naam dhoondhein aur tap karein — haazri lag jayegi bilkul waise jaise QR scan se lagti hai!</div>
    <input type="text" class="search-box" id="search-input" placeholder="🔍 Student naam ya class likhein..." oninput="filterStudents()" />
    <div class="student-select-list" id="student-list"></div>
  </div>
</div>

<!-- TODAY PANEL -->
<div class="panel" id="panel-today">
  <div class="full-today-wrap">
    <div style="font-size:12px;opacity:0.45;text-align:center;margin-bottom:14px;" id="today-date-lbl">—</div>
    <div id="full-list"></div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-num b" id="s-total">0</div><div class="stat-lbl">Total</div></div>
  <div class="stat-item"><div class="stat-num g" id="s-present">0</div><div class="stat-lbl">Hazir</div></div>
  <div class="stat-item"><div class="stat-num r" id="s-absent">0</div><div class="stat-lbl">Baqi</div></div>
</div>

<script>
const COLORS = ['#1a6b4a','#1a5276','#7d3c98','#b7950b','#c0392b','#16a085','#2471a3','#884ea0'];
const getInitials = n => (n||'').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
const getColor = i => COLORS[i % COLORS.length];
const todayKey = () => new Date().toISOString().split('T')[0];
const nowTime = () => new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});
const getData = () => { try { return JSON.parse(localStorage.getItem('darearqam_data')||'{}'); } catch(e) { return {}; } };
const saveData = d => { try { localStorage.setItem('darearqam_data', JSON.stringify(d)); } catch(e) {} };

// Clock
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const ds = `${days[n.getDay()]}, ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()}`;
  document.getElementById('hdate').textContent = ds;
  const el = document.getElementById('today-date-lbl');
  if(el) el.textContent = 'Aaj ki haazri — ' + ds;
}
setInterval(updateClock, 1000); updateClock();

// Beep
function playBeep(ok) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = ok ? 880 : 300; o.type = 'sine';
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (ok?0.3:0.6));
    o.start(); o.stop(ctx.currentTime + (ok?0.3:0.6));
  } catch(e){}
}

// Core mark function
function markAttendance(studentId) {
  const d = getData();
  const students = d.students || [];
  const student = students.find(s => String(s.id) === String(studentId));
  if(!student) return { type: 'error', student: null };
  const tk = todayKey();
  if(!d.attendance) d.attendance = {};
  if(!d.attendance[tk]) d.attendance[tk] = {};
  if(d.attendance[tk][student.id] === 'P') return { type: 'already', student };
  d.attendance[tk][student.id] = 'P';
  d.attendance[tk][student.id + '_time'] = nowTime();
  saveData(d); return { type: 'success', student };
}

// Show result card
let resTimer = null;
function showResult(cardId, type, student) {
  const card = document.getElementById(cardId);
  if(!card) return;
  const map = { success: ['✅','Haazri lag gayi! Khush Aamdeed 🎉'], already: ['⚠️','Pehle se haazri lagi hui hai!'], error: ['❌','Ye student registered nahi hai!'] };
  const [icon, msg] = map[type] || map.error;
  card.className = `result-card show ${type}`;
  card.innerHTML = `<div class="res-icon">${icon}</div><div class="res-name">${student?.name||'Pehchan Nahi Hua'}</div><div class="res-class">${student?.class||'—'}</div><div class="res-msg">${msg}</div>`;
  if(resTimer) clearTimeout(resTimer);
  resTimer = setTimeout(() => card.classList.remove('show'), 3000);
}

// Show banner (for manual)
let banTimer = null;
function showBanner(type, student) {
  const old = document.querySelector('.banner');
  if(old) old.remove();
  const ban = document.createElement('div');
  ban.className = 'banner';
  const colors = { success: '#1a6b4a', already: '#b8860b', error: '#c0392b' };
  const icons = { success: '✅', already: '⚠️', error: '❌' };
  const msgs = { success: `${student?.name} — Haazri lag gayi!`, already: `${student?.name} — Pehle se lagi hui hai`, error: 'Student nahi mila' };
  ban.style.background = colors[type]||colors.error;
  ban.style.color = 'white';
  ban.textContent = (icons[type]||'') + ' ' + (msgs[type]||'');
  document.body.appendChild(ban);
  if(banTimer) clearTimeout(banTimer);
  banTimer = setTimeout(() => ban.remove(), 2000);
}

// Update stats
function updateStats() {
  const d = getData();
  const total = (d.students||[]).length;
  const tk = todayKey();
  const att = (d.attendance&&d.attendance[tk]) ? d.attendance[tk] : {};
  const present = Object.keys(att).filter(k => !k.includes('_time') && att[k]==='P').length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-present').textContent = present;
  document.getElementById('s-absent').textContent = Math.max(0, total-present);
  document.getElementById('qr-count').textContent = present;
}

// Mini today list (QR panel)
function renderMiniToday() {
  const d = getData();
  const students = d.students||[];
  const tk = todayKey();
  const att = (d.attendance&&d.attendance[tk]) ? d.attendance[tk] : {};
  const presentIds = Object.keys(att).filter(k => !k.includes('_time') && att[k]==='P');
  const list = document.getElementById('qr-today');
  if(!presentIds.length) { list.innerHTML = '<div class="empty-state">Abhi tak koi nahi aaya...</div>'; return; }
  list.innerHTML = [...presentIds].reverse().map(id => {
    const s = students.find(x => String(x.id)===String(id));
    if(!s) return '';
    const idx = students.findIndex(x=>x.id===s.id);
    return `<div class="today-item"><div class="t-avatar" style="background:${getColor(idx)}33;color:${getColor(idx)}">${getInitials(s.name)}</div><div style="flex:1"><div class="t-name">${s.name}</div><div class="t-class">${s.class}</div></div><div class="t-time">${att[id+'_time']||''}</div></div>`;
  }).filter(Boolean).join('');
}

// Full today list
function renderFullToday() {
  const d = getData();
  const students = d.students||[];
  const tk = todayKey();
  const att = (d.attendance&&d.attendance[tk]) ? d.attendance[tk] : {};
  const container = document.getElementById('full-list');
  if(!students.length) { container.innerHTML = '<div class="no-data">👨‍🎓<br>Koi student nahi. Pehle dashboard mein add karein.</div>'; return; }
  container.innerHTML = students.map((s,i) => {
    const isP = att[s.id]==='P';
    return `<div class="full-today-item ${isP?'present':''}">
      <div class="t-avatar" style="background:${getColor(i)}33;color:${getColor(i)}">${getInitials(s.name)}</div>
      <div style="flex:1"><div class="t-name">${s.name}</div><div class="t-class" style="font-size:11px;opacity:0.45">${s.class}</div></div>
      ${isP ? `<div style="text-align:right"><div style="color:#2d9b6f;font-size:12px;font-weight:600">✅ Hazir</div><div style="font-size:10px;opacity:0.45">${att[s.id+'_time']||''}</div></div>`
             : '<div style="color:rgba(255,255,255,0.3);font-size:12px">—</div>'}
    </div>`;
  }).join('');
}

// Manual list
function renderManualList(query) {
  const d = getData();
  const students = d.students||[];
  const tk = todayKey();
  const att = (d.attendance&&d.attendance[tk]) ? d.attendance[tk] : {};
  const container = document.getElementById('student-list');
  if(!students.length) { container.innerHTML = '<div class="no-data">Koi student nahi.<br>Pehle main dashboard mein students add karein.</div>'; return; }
  let filtered = students;
  if(query&&query.trim()) filtered = students.filter(s => s.name.toLowerCase().includes(query.toLowerCase()) || s.class.toLowerCase().includes(query.toLowerCase()));
  if(!filtered.length) { container.innerHTML = '<div class="empty-state">Koi nahi mila...</div>'; return; }
  container.innerHTML = filtered.map(s => {
    const idx = students.findIndex(x=>x.id===s.id);
    const isP = att[s.id]==='P';
    return `<div class="student-select-item ${isP?'marked':''}" onclick="doManualMark('${s.id}')">
      <div class="sel-avatar" style="background:${getColor(idx)}33;color:${getColor(idx)}">${getInitials(s.name)}</div>
      <div style="flex:1"><div class="sel-name">${s.name}</div><div class="sel-class">${s.class}</div></div>
      <div class="sel-status ${isP?'present':'absent'}">${isP?'✅ '+att[s.id+'_time']:'Tap karein'}</div>
    </div>`;
  }).join('');
}

function filterStudents() { renderManualList(document.getElementById('search-input').value); }

let manCooldown = false;
function doManualMark(id) {
  if(manCooldown) return; manCooldown = true;
  const result = markAttendance(id);
  playBeep(result.type==='success');
  showBanner(result.type, result.student);
  refreshAll();
  setTimeout(() => manCooldown = false, 1500);
}

function refreshAll() {
  updateStats(); renderMiniToday(); renderManualList(document.getElementById('search-input')?.value||''); renderFullToday();
}

// Mode switching
let qrScanner = null;
let scanCooldown = false;
function switchMode(mode) {
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+mode).classList.add('active');
  document.getElementById('panel-'+mode).classList.add('active');
  if(mode==='manual') renderManualList();
  if(mode==='today') renderFullToday();
}

// QR Scanner
function initQR() {
  qrScanner = new Html5Qrcode("qr-reader");
  qrScanner.start({ facingMode:"environment" }, { fps:10, qrbox:{width:200,height:200}, aspectRatio:1.0 },
    text => {
      if(scanCooldown) return; scanCooldown = true;
      let studentId;
      try { studentId = JSON.parse(text).id; } catch(e) { studentId = text; }
      const result = markAttendance(studentId);
      playBeep(result.type==='success');
      showResult('qr-result', result.type, result.student);
      refreshAll();
      setTimeout(() => scanCooldown = false, 3000);
    }, () => {}
  ).catch(() => {
    document.getElementById('qr-reader').innerHTML = '<div style="padding:30px;text-align:center;opacity:0.5;font-size:13px;color:white">📷 Camera allow karein<br><small>Ya Manual tab use karein demo ke liye</small></div>';
  });
}

// Init
refreshAll();
initQR();
setInterval(refreshAll, 8000);
</script>
</body>
</html>
